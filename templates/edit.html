<!-- templates/edit.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Grocery Item</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>✏️ Update Item</h1>

    <form method="post" action="/update/{{ item.id }}">
        <input type="text" name="name" value="{{ item.name }}" required>
        <input type="text" name="category" value="{{ item.category }}" required>
        <input type="number" step="0.01" name="price_per_gram" value="{{ item.price_per_gram }}" required>
        <input type="number" step="0.1" name="weight_grams" value="{{ item.details.weight_grams }}" required>
        
        <label>
            <input type="checkbox" name="organic" {% if item.details.organic %}checked{% endif %}>
            Organic
        </label>

        <label for="availability">Availability:</label>
        <select name="availability" required>
            <option value="Need to buy" {% if item.details.availability == "Need to buy" %}selected{% endif %}>Need to buy</option>
            <option value="Out of stock" {% if item.details.availability == "Out of stock" %}selected{% endif %}>Out of stock</option>
            <option value="Already bought" {% if item.details.availability == "Already bought" %}selected{% endif %}>Already bought</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>

    <p><a href="/">← Back to Grocery List</a></p>
</body>
</html>
